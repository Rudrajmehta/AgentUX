# Monitor: Documentation comparison
# Daily check that the live docs site is at least as usable as the markdown source.

name: docs-comparison
surface: browser
target: https://docs.example.com/getting-started
task: "Find the installation instructions and the first code example"
schedule: "0 9 * * 1-5"
backend: openai
model: gpt-4.1
enabled: true
thresholds:
  aes_drop_pct: 15.0
  success_rate_min: 0.9
  max_steps: 20
tags:
  - documentation
  - weekly
