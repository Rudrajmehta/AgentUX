# Monitor: Pricing page usability
# Checks every 6 hours that an agent can find pricing information.

name: pricing-page
surface: browser
target: https://example.com/pricing
task: "Find the Pro plan price, compare it to the Free plan, and locate the free trial CTA"
schedule: "0 */6 * * *"
backend: openai
model: gpt-4.1
enabled: true
thresholds:
  aes_drop_pct: 10.0
  success_rate_min: 0.8
  max_steps: 15
tags:
  - production
  - pricing
  - critical-path
